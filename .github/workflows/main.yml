# .github/workflows/main.yml
name: Deploy Zensical to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Zensical
        run: pip install zensical

      - name: Build with Zensical
        run: zensical build --clean

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  # Deploy job
  deploy:
    if: github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # CalVer release job
  release-on-push:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Create CalVer tag
        id: calver
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags

          existing_tag="$(git tag --points-at HEAD | grep -E '^[0-9]{2}\.[0-9]{2}\.[0-9]+$' | head -n 1 || true)"
          if [[ -n "${existing_tag}" ]]; then
            echo "tag=${existing_tag}" >> "$GITHUB_OUTPUT"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="$(TZ=UTC date +%y.%m)"
          latest_for_month="$(git tag -l "${base}.*" | grep -E "^${base//./\\.}\.[0-9]+$" | sort -V | tail -n 1 || true)"

          if [[ -z "${latest_for_month}" ]]; then
            tag="${base}.0"
          else
            sequence="${latest_for_month##*.}"
            tag="${base}.$((sequence + 1))"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "created=true" >> "$GITHUB_OUTPUT"
      - name: Generate release notes
        id: notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.calver.outputs.tag }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          current_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
          previous_tag="$(git describe --tags --abbrev=0 "${current_commit}^" 2>/dev/null || true)"
          commit_url_base="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit"

          if [[ -n "${previous_tag}" ]]; then
            release_range="${previous_tag}..${RELEASE_TAG}"
          else
            release_range="${RELEASE_TAG}"
          fi

          release_body="$(git log \
            --format="- %s ([\`%h\`](${commit_url_base}/%H))" \
            "${release_range}")"

          if [[ -z "${release_body}" ]]; then
            release_body="- No changes listed for this release."
          fi

          {
            echo "body<<EOF"
            echo "${release_body}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Publish GitHub release
        uses: actions/github-script@v8
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          RELEASE_TAG: ${{ steps.calver.outputs.tag }}
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const body = process.env.RELEASE_BODY;
            const { owner, repo } = context.repo;

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              const release = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.data.id,
                tag_name: tag,
                name: `${tag}`,
                body,
              });
              core.info(`Updated release ${release.data.html_url}`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: `${tag}`,
              body,
            });

            core.info(`Created release ${release.data.html_url}`);
