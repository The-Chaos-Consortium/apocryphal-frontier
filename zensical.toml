[project]
site_name = "Apocryphal Frontier"
site_description = "System Reference Document for Apocryphal Frontier"
site_url = "https://srd.apocryphalfrontier.com"
docs_dir = "docs"
site_dir = "site"
copyright = "Copyright &copy; 2026 The Chaos Consortium & A.T. Gomez. Licensed under CC-BY-SA 4.0. Apocryphal Frontier&trade; is a trademark of The Chaos Consortium."
nav = [
  { "About" = "index.md" },
  { "Characters" = [
    { "Character Creation" = "character-creation.md" },
    { "Skills" = "skills.md" }
  ] }
]
extra_css = ["css/theme-custom.css"]

[project.theme]
variant = "modern"
features = [
  "navigation.instant",
  "navigation.tracking",
  "navigation.footer",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "navigation.top",
  "search.highlight",
  "content.tabs.link",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "red"
accent = "custom"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/The-Chaos-Consortium/apocryphal-frontier"

[project.markdown_extensions.tables]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.tilde]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.def_list]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.toc]
permalink = true

# Zensical's current docs don't expose TOML settings for the previous MkDocs
# search separator override or the older search.share/search.suggest flags, so
# they're intentionally omitted here rather than guessed.
